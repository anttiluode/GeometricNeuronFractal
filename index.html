<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geometric Neuron V5 + Resonator Memory</title>
<style>
    body { margin:0; overflow:hidden; background:#050505; color:#00ffcc; font-family:monospace; }
    canvas { display:block; }
    .panel {
        position:absolute; background:rgba(0,0,0,0.85); padding:15px; border:1px solid #00ffcc;
        border-radius:5px; max-width:320px; line-height:1.5;
    }
    #hud { top:20px; left:20px; }
    #controls { bottom:20px; left:20px; }
    #info { top:20px; right:20px; }
    input[type=range] { width:100%; }
    button { background:#00ffcc; color:#000; border:none; padding:8px 12px; cursor:pointer; font-weight:bold; }
    .red { color:#ff0055; }
    .purple { color:#c084fc; }
</style>
</head>
<body>

<div id="hud" class="panel">
    <strong>GEOMETRIC NEURON V5 + RESONATOR</strong><br>
    Nodes: <span id="nodeCount">1</span>/25000<br>
    Fractal D: <span id="fractalDim">0.000</span><br>
    Root Tensor: <span id="rootSignal">0.0000</span><br>
    Brainstem: <span id="bsSignal" class="purple">0.0000</span>
</div>

<div id="controls" class="panel">
    <strong>SYSTEM</strong><br>
    Brainstem Amp: <span id="bsVal">1.0</span><br>
    <input type="range" id="bsInput" min="0" max="3" step="0.1" value="1.0"><br>
    Growth Rate: <span id="growthVal">200</span><br>
    <input type="range" id="growthInput" min="10" max="800" step="10" value="200"><br>
    <button onclick="resetAll()">RESET ALL</button>
    <button onclick="toggleMemory()">Toggle Memory Loops</button>
</div>

<div id="info" class="panel">
    <strong>THEORY</strong><br>
    <small>Fractal growth + phasor logic.<br>
    Resonant loops = memory.</small>
</div>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
// ============== CORE PARAMETERS ==============
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');

let width, height, scale = 1, panX = 0, panY = 0;
let nodes = [];
let globalTime = 0;
let enableMemoryLoops = true;

// Resonator config (from your adder)
const GATE_CFG = {
    XOR: { w:[1,1], bias:0,   lo:-0.1, hi:1.0 },
    AND: { w:[1,1], bias:-2,  lo:3.0, hi:99 },
    OR:  { w:[1,1], bias:2,   lo:-0.1, hi:3.0 }
};

function encodeBit(b) { return b === 0 ? {re:1, im:0} : {re:-1, im:0}; }

// ============== GRAPH NODE ==============
function createRoot() {
    nodes = [{
        x: width/2, y: height/2,
        parent: null, children: [],
        accumulated: 0, topDown: 0,
        depth: 0, logicState: 'root',
        phase: 0, memory: 0  // for standing wave memory
    }];
}

// ============== GROWTH & SIGNAL ==============
function growDendrites(frameData, attempts) {
    const maxAttraction = 80;
    for (let i = 0; i < attempts; i++) {
        if (nodes.length >= 25000) break;
        const vx = Math.floor(Math.random() * video.videoWidth);
        const vy = Math.floor(Math.random() * video.videoHeight);
        const idx = (vy * video.videoWidth + vx) * 4;
        const lum = 0.299*frameData[idx] + 0.587*frameData[idx+1] + 0.114*frameData[idx+2];

        if (lum > 100) {
            const tx = (vx / video.videoWidth) * width;
            const ty = (vy / video.videoHeight) * height;
            const targetX = (tx - panX) / scale;
            const targetY = (ty - panY) / scale;

            let nearest = null, minDist = Infinity;
            for (let j = nodes.length-1; j >= 0; j--) {
                const n = nodes[j];
                const d = Math.hypot(targetX - n.x, targetY - n.y);
                if (d < minDist) { minDist = d; nearest = n; }
            }

            if (nearest && minDist > 8 && minDist < maxAttraction) {
                const angle = Math.atan2(targetY - nearest.y, targetX - nearest.x);
                const nx = nearest.x + Math.cos(angle) * 8;
                const ny = nearest.y + Math.sin(angle) * 8;

                const newNode = {
                    x: nx, y: ny,
                    parent: nearest,
                    children: [],
                    accumulated: 0,
                    topDown: 0,
                    depth: nearest.depth + 1,
                    logicState: 'none',
                    phase: 0,
                    memory: 0
                };
                nearest.children.push(newNode);
                nodes.push(newNode);
            }
        }
    }
}

// Simple resonator compute
function resonatorCompute(kind, inputs) {
    const cfg = GATE_CFG[kind] || GATE_CFG.XOR;
    let re = cfg.bias, im = 0;
    inputs.forEach((bit, i) => {
        const p = encodeBit(bit);
        re += cfg.w[i] * p.re;
        im += cfg.w[i] * p.im;
    });
    const amp = Math.hypot(re, im);
    const fired = (amp >= cfg.lo && amp <= cfg.hi) ? 1 : 0;
    return {amp, fired, re, im};
}

// ============== MAIN LOOP ==============
function processFrame() {
    if (video.readyState < 2) { requestAnimationFrame(processFrame); return; }

    globalTime += 0.05;
    const off = document.createElement('canvas');
    off.width = video.videoWidth; off.height = video.videoHeight;
    const octx = off.getContext('2d');
    octx.drawImage(video, 0, 0);
    const data = octx.getImageData(0,0,off.width,off.height).data;

    if (nodes.length < 25000) growDendrites(data, 200);

    // Brainstem carrier
    const bsAmp = parseFloat(document.getElementById('bsInput').value);
    const bs = Math.sin(globalTime) * bsAmp;
    nodes[0].topDown = bs;

    // Propagate top-down
    for (let i = 1; i < nodes.length; i++) {
        nodes[i].topDown = nodes[i].parent.topDown * 0.98;
    }

    // Sensory at tips + memory resonance
    for (let node of nodes) {
        if (node.children.length === 0) {
            // sample webcam
            const sx = node.x * scale + panX;
            const sy = node.y * scale + panY;
            const vx = Math.floor((sx / width) * off.width);
            const vy = Math.floor((sy / height) * off.height);
            if (vx >= 0 && vx < off.width && vy >= 0 && vy < off.height) {
                const idx = (vy * off.width + vx) * 4;
                const lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
                node.accumulated = lum / 255;
            }
        }
        // Simple memory resonance
        if (enableMemoryLoops && node.children.length > 1) {
            node.memory = (node.memory + node.topDown * 0.3) * 0.92;
        }
    }

    // Bottom-up propagation (simplified for demo)
    for (let i = nodes.length-1; i >= 0; i--) {
        const n = nodes[i];
        if (n.children.length === 0) continue;
        if (n.children.length === 1) {
            n.accumulated = n.children[0].accumulated * 0.95;
        } else {
            // demo interference
            n.accumulated = Math.abs(n.children[0].accumulated - n.children[1].accumulated || 0) * 0.9;
        }
    }

    updateUI();
    render();
    requestAnimationFrame(processFrame);
}

function updateUI() {
    document.getElementById('nodeCount').textContent = nodes.length;
    document.getElementById('rootSignal').textContent = nodes[0].accumulated.toFixed(4);
    document.getElementById('bsSignal').textContent = nodes[0].topDown.toFixed(4);
}

function render() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);

    // edges
    ctx.strokeStyle = 'rgba(0,255,200,0.15)';
    ctx.lineWidth = 1/scale;
    ctx.beginPath();
    for (let i = 1; i < nodes.length; i++) {
        const n = nodes[i];
        ctx.moveTo(n.x, n.y);
        ctx.lineTo(n.parent.x, n.parent.y);
    }
    ctx.stroke();

    // nodes
    for (let n of nodes) {
        const size = Math.max(1.5, 3 / scale);
        if (n.logicState === 'root') {
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(n.x, n.y, 8, 0, Math.PI*2);
            ctx.fill();
        } else if (enableMemoryLoops && Math.abs(n.memory) > 0.3) {
            ctx.fillStyle = '#c084fc'; // purple resonant memory
            ctx.fillRect(n.x-size, n.y-size, size*2, size*2);
        } else if (n.accumulated > 0.3) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(n.x-size/2, n.y-size/2, size, size);
        } else {
            ctx.fillStyle = '#555';
            ctx.fillRect(n.x-size/2, n.y-size/2, size, size);
        }
    }
    ctx.restore();
}

// Controls & resize
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    if (nodes.length === 0) createRoot();
}
window.addEventListener('resize', resize);

document.getElementById('bsInput').oninput = () => {
    document.getElementById('bsVal').textContent = parseFloat(document.getElementById('bsInput').value).toFixed(1);
};

function resetAll() {
    nodes = [];
    createRoot();
}

function toggleMemory() {
    enableMemoryLoops = !enableMemoryLoops;
}

// Mouse controls (pan/zoom) - abbreviated for brevity
let isDragging = false, lastX, lastY;
canvas.addEventListener('mousedown', e => { isDragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
    if (isDragging) {
        panX += e.clientX - lastX;
        panY += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
    }
});
canvas.addEventListener('wheel', e => {
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const mx = e.clientX, my = e.clientY;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    scale *= factor;
});

// Webcam
navigator.mediaDevices.getUserMedia({video:true}).then(s => {
    video.srcObject = s;
    video.play();
}).catch(console.error);

resize();
processFrame();
</script>
</body>
</html>
